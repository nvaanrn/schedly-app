<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Schedly — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="logo">
    <a class="logo-mark" href="/auth.html">
      <div class="logo-icon">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/>
        </svg>
      </div>
      <span class="logo-text">Sched<span>ly</span></span>
    </a>
  </div>

  <div class="auth-card">
    <!-- Panel: Form Reset -->
    <div id="panel-form">
      <h1 class="form-title">Reset Password</h1>
      <p class="form-subtitle">Buat password baru untuk akun kamu</p>

      <div class="alert alert-error" id="reset-error"></div>
      <div class="alert alert-success" id="reset-success"></div>

      <form id="reset-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="new-pass">Password Baru</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
            </span>
            <input type="password" id="new-pass" class="form-input" placeholder="Min. 8 karakter" autocomplete="new-password"/>
          </div>
          <div class="strength-bar">
            <span id="s1"></span><span id="s2"></span><span id="s3"></span><span id="s4"></span>
          </div>
          <div class="strength-label" id="strength-label"></div>
          <span class="field-error" id="pass-err">Password minimal 8 karakter</span>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm-pass">Konfirmasi Password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
              </svg>
            </span>
            <input type="password" id="confirm-pass" class="form-input" placeholder="Ulangi password baru" autocomplete="new-password"/>
          </div>
          <span class="field-error" id="confirm-err">Password tidak cocok</span>
        </div>
        <button type="submit" class="btn-submit" id="reset-btn">
          <div class="spinner"></div>
          <span class="btn-text">Reset Password</span>
        </button>
      </form>
    </div>

    <!-- Panel: Token Invalid -->
    <div id="panel-invalid" style="display:none; text-align:center; padding:1rem 0;">
      <div style="font-size:2.5rem; margin-bottom:1rem;">⚠️</div>
      <h2 class="form-title" style="font-size:1.1rem;">Link Tidak Valid</h2>
      <p class="form-subtitle">Link reset password sudah kadaluarsa atau tidak valid. Silakan minta ulang.</p>
      <a href="/auth.html" class="btn-submit" style="display:flex;margin-top:1.5rem;text-decoration:none;">Kembali ke Login</a>
    </div>
  </div>
</div>

<script>
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) {
    document.getElementById('panel-form').style.display = 'none';
    document.getElementById('panel-invalid').style.display = 'block';
  }

  function checkStrength(pass) {
    const bars = ['s1','s2','s3','s4'].map(id => document.getElementById(id));
    const label = document.getElementById('strength-label');
    const colors = ['#EF4444','#F59E0B','#3B82F6','#10B981'];
    const labels = ['','Lemah','Sedang','Kuat','Sangat Kuat'];
    let score = 0;
    if (pass.length >= 8) score++;
    if (/[A-Z]/.test(pass)) score++;
    if (/[0-9]/.test(pass)) score++;
    if (/[^A-Za-z0-9]/.test(pass)) score++;
    bars.forEach((b,i) => b.style.background = i < score ? colors[score-1] : '#E2E0DC');
    label.textContent = pass ? labels[score] : '';
    label.style.color = score > 0 ? colors[score-1] : '#6B7280';
  }
  document.getElementById('new-pass').addEventListener('input', e => checkStrength(e.target.value));

  document.getElementById('reset-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pass = document.getElementById('new-pass').value;
    const conf = document.getElementById('confirm-pass').value;
    document.querySelectorAll('.field-error').forEach(el => el.classList.remove('show'));
    document.querySelectorAll('.form-input').forEach(el => el.classList.remove('error'));

    let valid = true;
    if (pass.length < 8) {
      document.getElementById('new-pass').classList.add('error');
      document.getElementById('pass-err').classList.add('show');
      valid = false;
    }
    if (pass !== conf) {
      document.getElementById('confirm-pass').classList.add('error');
      document.getElementById('confirm-err').classList.add('show');
      valid = false;
    }
    if (!valid) return;

    const btn = document.getElementById('reset-btn');
    btn.classList.add('loading'); btn.disabled = true;

    try {
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password: pass })
      });
      const data = await res.json();
      if (res.ok) {
        document.getElementById('reset-success').textContent = data.message + ' Mengarahkan ke login...';
        document.getElementById('reset-success').classList.add('show');
        document.getElementById('reset-form').style.display = 'none';
        setTimeout(() => window.location.href = '/auth.html', 2500);
      } else {
        if (res.status === 400 && data.message.includes('Token')) {
          document.getElementById('panel-form').style.display = 'none';
          document.getElementById('panel-invalid').style.display = 'block';
        } else {
          document.getElementById('reset-error').textContent = data.message;
          document.getElementById('reset-error').classList.add('show');
        }
      }
    } catch {
      document.getElementById('reset-error').textContent = 'Tidak dapat terhubung ke server';
      document.getElementById('reset-error').classList.add('show');
    }
    btn.classList.remove('loading'); btn.disabled = false;
  });
</script>
</body>
</html>
