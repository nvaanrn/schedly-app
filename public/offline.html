<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Schedly</title>
  <meta name="theme-color" content="#5C6AC4">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1E1E2E">
  <!-- Apple PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Schedly">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --clr-bg: #F5F3EE;
      --clr-surface: #FFFFFF;
      --clr-accent: #5C6AC4;
      --clr-accent-dark: #3F4EA8;
      --clr-text: #1A1A2E;
      --clr-muted: #6B7280;
      --clr-border: #E2E0DC;
      --radius: 16px;
    }

    html.dark-mode {
      --clr-bg: #0F0F17;
      --clr-surface: #1A1A2E;
      --clr-text: #E8E8F0;
      --clr-border: rgba(255, 255, 255, 0.08);
      --clr-muted: #9CA3AF;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--clr-bg);
      color: var(--clr-text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      transition: background 0.3s, color 0.3s;
    }

    .card {
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius);
      padding: 40px 30px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    .icon-container {
      width: 80px;
      height: 80px;
      background: rgba(92, 106, 196, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      color: var(--clr-accent);
    }

    h1 {
      font-family: 'Sora', sans-serif;
      font-size: 1.5rem;
      margin-bottom: 12px;
      font-weight: 700;
    }

    p {
      color: var(--clr-muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .btn-retry {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--clr-accent);
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 0.95rem;
      font-weight: 700;
      border-radius: 12px;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-retry:hover {
      background: var(--clr-accent-dark);
    }

    .btn-retry:active {
      transform: scale(0.98);
    }
  </style>
  <script>
    // Sinkronkan tema dark mode
    if (localStorage.getItem('schedly-theme') === 'dark') {
      document.documentElement.classList.add('dark-mode');
    }
  </script>
</head>
<body>
  <div class="card">
    <div class="icon-container">
      <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-3.536 4.978 4.978 0 011.414-3.536m0 0l2.828 2.828M5.636 5.636a9 9 0 000 12.728m0 0l2.829-2.829M3 21l1.414-1.414" />
      </svg>
    </div>
    <h1>Koneksi Terputus</h1>
    <p>Schedly memerlukan koneksi internet untuk memuat tugas Anda. Silakan periksa koneksi Anda dan coba lagi.</p>
    <button class="btn-retry" onclick="window.location.reload()">Coba Lagi</button>
  </div>
</body>
</html>
